<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700;800&family=Manrope:wght@600;700;800&family=Montserrat:wght@800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --panel-radius: 35px;
            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
            --ease-smooth: cubic-bezier(0.22, 1, 0.36, 1);
        }
        body {
            margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center;
            height: 100vh;
            font-family: 'Manrope', 'Inter', system-ui, sans-serif;
            background: transparent;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        /* Не используем opacity на всём блоке — в OBS (хромакей) полупрозрачное колесо «просвечивает» сцену */
        #main-layout {
            position: relative;
            transition:
                transform 1.25s cubic-bezier(0.25, 0.46, 0.45, 0.98),
                opacity 1.15s cubic-bezier(0.25, 0.46, 0.45, 1),
                filter 1.15s cubic-bezier(0.25, 0.46, 0.45, 1);
            transform: translateZ(0) scale(1);
            opacity: 1;
            filter: brightness(1);
            backface-visibility: hidden;
        }
        body.idle #main-layout {
            transform: translateZ(0) scale(0.94);
            opacity: 1;
            filter: none;
        }
        body.idle.panels-enter #main-layout {
            transition:
                transform 1.7s var(--ease-out-expo),
                opacity 1.55s var(--ease-smooth),
                filter 1.55s var(--ease-smooth);
        }
        body.winner-active #main-layout {
            transform: translateZ(0) scale(0.8);
            opacity: 1;
            filter: brightness(0.38) saturate(0.9);
        }
        body.spinning:not(.winner-active) #main-layout {
            filter: brightness(1);
        }

        /* Сцена колеса: перспектива, объём, лёгкое блюр вне вращения */
        .wheel-scene {
            position: relative;
            width: 620px;
            height: 620px;
            margin: 0 auto;
            perspective: 1500px;
            perspective-origin: 50% 36%;
            transform-style: preserve-3d;
            transition: filter 1.2s cubic-bezier(0.25, 0.46, 0.45, 1);
        }
        body.idle .wheel-scene {
            filter: none;
        }
        /* Blur + затемнение только у диска; подписи на отдельном canvas — без полупрозрачного текста */
        body.idle .wheel-disk-layer {
            filter: blur(2.2px) saturate(1.08) brightness(0.58);
            transition: filter 1.45s var(--ease-smooth);
        }
        body.idle.panels-enter .wheel-disk-layer {
            transition: filter 1.45s var(--ease-smooth);
        }
        body.winner-active .wheel-scene {
            filter: none;
        }
        body.spinning:not(.winner-active) .wheel-disk-layer {
            filter: none;
        }
        body.idle.panels-spin-exit .wheel-disk-layer {
            filter: none;
            transition: filter 0.72s var(--ease-smooth);
        }

        /* Отдельный корень UI без transform — иначе в OBS fixed-панели могут жить в одной композитной группе с колесом */
        #ui-root {
            position: fixed;
            inset: 0;
            z-index: 500;
            pointer-events: none;
            isolation: isolate;
        }
        #ui-root #ui-column {
            pointer-events: none;
        }
        #ui-root .glass-panel {
            pointer-events: auto;
        }

        .glass-panel {
            --panel-br: var(--panel-radius, 35px);
            position: fixed; left: 50%; transform: translateX(-50%);
            background: linear-gradient(165deg,
                rgba(255, 250, 230, calc(var(--op, 0.72) * 0.88)) 0%,
                rgba(220, 180, 70, var(--op, 0.72)) 42%,
                rgba(75, 58, 32, calc(var(--op, 0.8) + 0.04)) 100%);
            -webkit-backdrop-filter: blur(calc(var(--blur, 15) * 1.12px)) saturate(1.25);
            backdrop-filter: blur(calc(var(--blur, 15) * 1.12px)) saturate(1.25);
            border-radius: var(--panel-br);
            border: 1px solid rgba(255, 246, 210, 0.42);
            z-index: 500;
            display: flex; flex-direction: column; align-items: stretch; justify-content: center;
            transition:
                opacity 0.55s cubic-bezier(0.25, 0.46, 0.45, 1),
                box-shadow 0.55s ease,
                transform 0.65s var(--ease-smooth),
                filter 0.45s ease;
            padding: 14px 16px; box-sizing: border-box; text-align: center;
            overflow: visible;
            isolation: isolate;
            box-shadow:
                0 0 0 2px rgba(255, 228, 150, 0.95),
                0 0 0 5px rgba(45, 32, 14, 0.92),
                0 0 0 7px rgba(212, 165, 55, 0.75),
                0 0 0 9px rgba(15, 10, 6, 0.55),
                0 1px 0 rgba(255, 255, 255, 0.5) inset,
                0 -10px 28px rgba(0, 0, 0, 0.2) inset,
                0 28px 60px rgba(0, 0, 0, 0.48),
                0 0 80px rgba(255, 195, 60, 0.2),
                0 0 120px rgba(255, 170, 40, 0.08);
            filter: drop-shadow(0 18px 36px rgba(0, 0, 0, 0.28)) drop-shadow(0 0 24px rgba(255, 200, 80, 0.12));
        }
        /* Статичный ореол — без rotate, чтобы блики не «ехали» синхронно с колесом */
        .glass-panel::before {
            content: "";
            position: absolute;
            inset: -12px;
            border-radius: calc(var(--panel-br) + 12px);
            background: conic-gradient(from 38deg,
                rgba(255, 230, 170, 0) 0deg,
                rgba(255, 210, 130, 0.22) 70deg,
                rgba(200, 150, 50, 0.18) 140deg,
                rgba(255, 248, 220, 0.28) 210deg,
                rgba(255, 185, 70, 0.2) 290deg,
                rgba(255, 230, 170, 0) 360deg);
            opacity: 0.55;
            z-index: -2;
            pointer-events: none;
            transform: none;
            animation: panelGlowPulse 5.5s ease-in-out infinite;
        }
        @keyframes panelGlowPulse {
            0%, 100% { opacity: 0.48; }
            50% { opacity: 0.62; }
        }
        .glass-panel::after {
            content: "";
            position: absolute;
            inset: 3px;
            border-radius: calc(var(--panel-br) - 3px);
            border: 1px solid rgba(255, 255, 255, 0.22);
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.35),
                inset 0 -16px 36px rgba(0, 0, 0, 0.12);
            pointer-events: none;
            z-index: 0;
        }
        body:not(.idle) .glass-panel { opacity: 0; visibility: hidden; pointer-events: none; }
        body.idle .glass-panel { opacity: 1; visibility: visible; }

        /* Плавный уход панелей перед стартом вращения (ещё в режиме idle) */
        body.idle.panels-spin-exit #main-layout {
            transform: translateZ(0) scale(1);
            opacity: 1;
            filter: brightness(1);
            transition: transform 0.88s var(--ease-out-expo), opacity 0.75s var(--ease-smooth), filter 0.75s var(--ease-smooth);
        }
        body.idle.panels-spin-exit #wheel-wrapper {
            transform: translateZ(6px) rotateX(2.8deg) scale(1.008);
            transition: transform 0.88s var(--ease-out-expo);
        }
        body.idle.panels-spin-exit .glass-panel {
            opacity: 0 !important;
            visibility: visible;
            transform: translateX(-50%) translateY(42px) scale(0.92);
            filter: blur(5px);
            pointer-events: none;
            transition:
                opacity 0.52s var(--ease-smooth),
                transform 0.58s var(--ease-out-expo),
                filter 0.45s ease;
        }
        body.idle.panels-spin-exit #history-node {
            transition-delay: 0.07s;
        }

        body.idle.panels-enter #start-node {
            animation: panelPopStart 0.78s cubic-bezier(0.22, 1, 0.36, 1) both;
        }
        body.idle.panels-enter #history-node {
            animation: panelPopHist 0.88s 0.14s cubic-bezier(0.22, 1, 0.36, 1) both;
        }
        @keyframes panelPopStart {
            0% { transform: translateX(-50%) translateY(48px) scale(0.82) rotate(-0.45deg); opacity: 0; filter: blur(8px); }
            50% { transform: translateX(-50%) translateY(-6px) scale(1.025); opacity: 1; filter: blur(0); }
            100% { transform: translateX(-50%) translateY(0) scale(1); opacity: 1; filter: none; }
        }
        @keyframes panelPopHist {
            0% { transform: translateX(-50%) translateY(52px) scale(0.86); opacity: 0; filter: blur(7px); }
            52% { transform: translateX(-50%) translateY(-4px) scale(1.018); opacity: 1; filter: blur(0); }
            100% { transform: translateX(-50%) translateY(0) scale(1); opacity: 1; filter: none; }
        }

        #start-node.glass-panel--hit {
            cursor: pointer;
            justify-content: center; align-items: center;
        }
        #start-node .hit-ring {
            position: absolute; inset: -3px; border-radius: inherit;
            background: linear-gradient(125deg,
                rgba(255,255,255,0) 0%,
                rgba(255,255,255,0.22) 45%,
                rgba(255,255,255,0) 90%);
            opacity: 0.35;
            pointer-events: none;
            transform: none;
            animation: hitSheenPulse 6s ease-in-out infinite;
        }
        @keyframes hitSheenPulse {
            0%, 100% { opacity: 0.28; }
            50% { opacity: 0.42; }
        }
        #start-node .hit-sheen {
            position: absolute; inset: 0; border-radius: inherit;
            background: linear-gradient(180deg, rgba(255,255,255,0.35) 0%, transparent 45%);
            opacity: 0.55; pointer-events: none; mix-blend-mode: screen;
            z-index: 2;
        }
        #start-node .start-text { position: relative; z-index: 3; }
        #history-node .conveyor-topcap { z-index: 3; }
        #history-node #history-title { z-index: 4; }
        #history-node #history-viewport { z-index: 3; position: relative; }
        #start-node:active { transform: translateX(-50%) scale(0.97); box-shadow: 0 12px 28px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.35) inset; }
        #start-node { will-change: transform; }

        .start-text {
            position: relative; z-index: 2;
            color: #ffffff;
            font-family: 'Manrope', 'Inter', system-ui, sans-serif;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.09em;
            line-height: 1.15;
            text-shadow: 0 1px 3px rgba(0,0,0,0.55), 0 0 24px rgba(0,0,0,0.35);
            width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; margin: 0;
        }
        #history-node.glass-panel--conveyor .conveyor-topcap {
            position: absolute; top: 0; left: 8%; right: 8%; height: 3px;
            border-radius: 99px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.75), transparent);
            opacity: 0.85; pointer-events: none;
        }

        #history-title {
            position: relative; z-index: 2;
            font-family: 'Manrope', 'Inter', system-ui, sans-serif;
            font-weight: 800;
            letter-spacing: 0.22em;
            color: #ffffff;
            margin-bottom: 6px;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5), 0 0 20px rgba(0,0,0,0.3);
        }
        #history-viewport {
            position: relative; z-index: 1;
            width: 100%; flex: 1; overflow: hidden;
            mask-image: linear-gradient(to bottom, transparent, black 12%, black 88%, transparent);
        }
        #history-list {
            display: flex; flex-direction: column; align-items: center; width: 100%;
            position: absolute; left: 0;
            animation: conveyor var(--conv-speed, 15s) linear infinite;
            will-change: transform;
            transform: translateZ(0);
        }
        @keyframes conveyor { 0% { transform: translateY(140px); } 100% { transform: translateY(-100%); } }
        .list-item {
            font-family: 'Manrope', 'Inter', system-ui, sans-serif;
            color: #ffffff;
            font-weight: 700;
            padding: 9px 0;
            width: 95%;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            line-height: 1.25;
            text-shadow: 0 1px 2px rgba(0,0,0,0.45);
            border-bottom: 1px solid rgba(255,255,255,0.12);
        }

        .winner-backdrop {
            position: fixed;
            inset: 0;
            z-index: 585;
            pointer-events: none;
            opacity: 0;
            background:
                radial-gradient(circle at 50% 40%, rgba(255, 200, 90, 0.08) 0%, transparent 45%),
                radial-gradient(circle at 50% 100%, rgba(0, 0, 0, 0.65) 0%, transparent 55%),
                rgba(4, 2, 8, 0.55);
            transition: opacity 0.65s var(--ease-out-expo);
        }
        body.winner-active .winner-backdrop {
            opacity: 1;
        }
        body.revealing-ui .winner-backdrop {
            opacity: 0;
            transition: opacity 1.15s var(--ease-smooth);
        }

        .winner-plate {
            --winner-drop: drop-shadow(0 28px 80px rgba(0, 0, 0, 0.65)) drop-shadow(0 0 60px rgba(255, 190, 60, 0.18));
            position: fixed;
            top: 50%; left: 50%;
            width: min(560px, 94vw);
            z-index: 600;
            padding: 0;
            border: none;
            background: transparent;
            transform: translate(-50%, -50%) scale(0.96);
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            perspective: 900px;
            overflow: visible;
            filter: var(--winner-drop);
        }
        /* Не задаём transform здесь — только анимации, иначе бой с keyframes и скачок при снятии is-open */
        body.winner-active .winner-plate {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }

        .winner-plate__ring {
            position: absolute;
            inset: -5px;
            border-radius: 44px;
            background: linear-gradient(128deg,
                #c9a012 0%,
                #ffe566 22%,
                #fff2c4 45%,
                #ffd84a 65%,
                #8a6520 88%,
                #ffd84a 100%);
            opacity: 0.88;
            pointer-events: none;
            transform: none;
            animation: winnerRingPulse 4s ease-in-out infinite;
        }
        @keyframes winnerRingPulse {
            0%, 100% { opacity: 0.82; filter: brightness(1); }
            50% { opacity: 0.95; filter: brightness(1.06); }
        }

        .winner-plate__shine {
            position: absolute;
            inset: -5px;
            border-radius: 44px;
            background: linear-gradient(105deg,
                transparent 35%,
                rgba(255, 255, 255, 0.22) 48%,
                transparent 62%);
            pointer-events: none;
            animation: winnerShineSweep 3.2s ease-in-out infinite;
        }
        @keyframes winnerShineSweep {
            0%, 100% { opacity: 0.4; transform: translateX(-6%) skewX(-8deg); }
            50% { opacity: 0.85; transform: translateX(6%) skewX(-8deg); }
        }

        .winner-plate__body {
            position: relative;
            margin: 4px;
            padding: 38px 44px 32px;
            border-radius: 38px;
            background: linear-gradient(168deg, #1e1a28 0%, #0c0a12 48%, #121018 100%);
            border: 2px solid rgba(255, 220, 140, 0.55);
            box-shadow:
                0 0 0 1px rgba(0, 0, 0, 0.8) inset,
                0 2px 0 rgba(255, 230, 180, 0.18) inset,
                0 -24px 52px rgba(0, 0, 0, 0.55) inset;
            text-align: center;
            -webkit-backdrop-filter: blur(18px) saturate(1.15);
            backdrop-filter: blur(18px) saturate(1.15);
            overflow: hidden;
        }
        .winner-plate__body::before {
            content: "";
            position: absolute;
            top: -40%; left: -20%;
            width: 140%;
            height: 80%;
            background: radial-gradient(ellipse, rgba(255, 200, 80, 0.14) 0%, transparent 70%);
            pointer-events: none;
        }

        .winner-plate__gems {
            display: flex;
            justify-content: center;
            gap: 14px;
            margin-bottom: 12px;
            opacity: 0.9;
        }
        .winner-plate__gems span {
            width: 7px; height: 7px; border-radius: 50%;
            background: radial-gradient(circle at 30% 25%, #fff7d4, #e8b931);
            box-shadow: 0 0 12px rgba(255, 215, 90, 0.7);
        }

        .winner-plate__dismiss {
            display: block;
            margin-top: 22px;
            font-size: 0.68rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: rgba(255, 235, 200, 0.38);
            font-weight: 600;
        }

        .winner-plate.is-open:not(.is-closing) {
            animation: winnerEnter 0.88s var(--ease-out-expo) forwards;
        }
        .winner-plate.is-open:not(.is-closing) .winner-plate__body {
            animation: winnerBodySettle 0.88s var(--ease-smooth) forwards;
        }
        @keyframes winnerEnter {
            0% {
                transform: translate(-50%, -46%) scale(0.78) rotateX(14deg);
                opacity: 0;
            }
            70% {
                transform: translate(-50%, -50.5%) scale(1.028) rotateX(-1.5deg);
                opacity: 1;
            }
            100% {
                transform: translate(-50%, -50%) scale(1) rotateX(0);
                opacity: 1;
            }
        }
        @keyframes winnerBodySettle {
            0% { transform: scale(0.96); opacity: 0.88; }
            100% { transform: scale(1); opacity: 1; }
        }
        .winner-plate.is-closing .winner-plate__body {
            animation: none;
            transform: scale(1);
            opacity: 1;
        }

        .winner-plate.is-closing {
            animation: winnerLeave 0.82s cubic-bezier(0.55, 0.08, 0.82, 0.32) forwards;
        }
        /* Явный from: после снятия is-open не прыгаем в scale(0.96) */
        @keyframes winnerLeave {
            from {
                transform: translate(-50%, -50%) scale(1) rotateX(0);
                opacity: 1;
            }
            to {
                transform: translate(-50%, -44%) scale(0.9) rotateX(5deg);
                opacity: 0;
            }
        }

        #winner-flavor {
            position: relative;
            z-index: 1;
            font-family: 'Montserrat', 'Manrope', sans-serif;
            font-size: clamp(15px, 3vw, 20px);
            font-weight: 900;
            letter-spacing: 0.32em;
            margin-bottom: 16px;
            display: block;
            text-transform: uppercase;
            background: linear-gradient(92deg, #fff6d4, #ffd24a 35%, #fff9e8 55%, #d4a017);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: winnerLabelHue 4s ease-in-out infinite;
        }
        @keyframes winnerLabelHue {
            0%, 100% { background-position: 0% center; }
            50% { background-position: 100% center; }
        }

        #winner-name {
            position: relative;
            z-index: 1;
            color: #fffefb;
            font-weight: 800;
            margin: 0;
            text-shadow:
                0 0 40px rgba(255, 200, 90, 0.35),
                0 2px 4px rgba(0, 0, 0, 0.6);
            line-height: 1.22;
            text-transform: uppercase;
            word-wrap: break-word;
            font-family: 'Manrope', 'Inter', system-ui, sans-serif;
            letter-spacing: 0.04em;
        }

        #wheel-wrapper {
            position: relative;
            width: 620px;
            height: 620px;
            transform-style: preserve-3d;
            transform: translateZ(0) rotateX(3.5deg);
            transition: transform 1.25s cubic-bezier(0.25, 0.46, 0.45, 0.98);
        }
        .wheel-disk-layer {
            position: absolute;
            left: 0;
            top: 0;
            width: 620px;
            height: 620px;
            pointer-events: none;
            border-radius: 50%;
        }
        canvas#wheel-labels {
            position: absolute;
            left: 0;
            top: 0;
            z-index: 4;
            pointer-events: none;
            background: transparent;
            box-shadow: none;
        }
        body.idle #wheel-wrapper {
            transform: translateZ(-22px) rotateX(9deg) scale(0.985);
        }
        body.spinning:not(.winner-active) #wheel-wrapper {
            transform: translateZ(8px) rotateX(2deg) scale(1.01);
        }
        body.winner-active #wheel-wrapper {
            transform: translateZ(-36px) rotateX(12deg) scale(0.93);
        }
        #center-logo-container {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%) translateZ(32px);
            width: 118px; height: 118px; border-radius: 50%;
            border: 5px solid #121820;
            box-shadow:
                0 0 0 2px rgba(255,210,120,0.4),
                0 20px 48px rgba(0,0,0,0.5) inset,
                0 12px 32px rgba(0,0,0,0.35);
            z-index: 60; overflow: hidden; background: radial-gradient(circle at 30% 25%, #2a3038, #050608);
            contain: strict;
            isolation: isolate;
            transition: transform 1.2s cubic-bezier(0.25, 0.46, 0.45, 1);
        }
        #center-img {
            width: 100%; height: 100%; object-fit: cover;
            transform: translateZ(0);
            backface-visibility: hidden;
            image-rendering: auto;
        }
        #arrow-container {
            position: absolute; top: -20px; left: 50%;
            transform: translateX(-50%) translateZ(48px);
            z-index: 100; width: 52px; height: 74px;
            filter: drop-shadow(0 10px 18px rgba(0,0,0,0.35));
        }
        #arrow { width: 100%; height: 100%; transform-origin: 50% 10%; will-change: transform; }
        canvas#wheel {
            display: block;
            border-radius: 50%;
            transform: translateZ(0);
            background: #08080e;
            /* без тяжёлой внешней тени — в OBS даёт чёрное «ореольное» пятно за колесом */
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.08) inset,
                0 0 20px rgba(255, 200, 100, 0.08) inset;
        }
    </style>
</head>
<body class="idle">
<div id="ui-root">
<div id="ui-column">
    <div id="start-node" class="glass-panel glass-panel--hit" onclick="startSpin()">
        <span class="hit-ring" aria-hidden="true"></span>
        <span class="hit-sheen" aria-hidden="true"></span>
        <p class="start-text" id="st-label"></p>
    </div>
    <div id="history-node" class="glass-panel glass-panel--conveyor">
        <span class="conveyor-topcap" aria-hidden="true"></span>
        <div id="history-title"></div>
        <div id="history-viewport"><div id="history-list"></div></div>
    </div>
</div>
</div>
<div class="winner-backdrop" id="winner-backdrop" aria-hidden="true"></div>
<div class="winner-plate" id="winner-plate" role="dialog" aria-modal="true" onclick="resetToIdle()">
    <div class="winner-plate__ring" aria-hidden="true"></div>
    <div class="winner-plate__shine" aria-hidden="true"></div>
    <div class="winner-plate__body">
        <div class="winner-plate__gems" aria-hidden="true"><span></span><span></span><span></span><span></span><span></span></div>
        <span id="winner-flavor">ВЫИГРЫШ!</span>
        <p id="winner-name"></p>
        <span class="winner-plate__dismiss">Нажмите, чтобы продолжить</span>
    </div>
</div>
<div id="main-layout">
    <div class="wheel-scene" id="wheel-scene">
    <div id="wheel-wrapper">
        <div id="center-logo-container"><img id="center-img" alt="" src="" decoding="async" fetchpriority="low"></div>
        <div id="arrow-container"><svg id="arrow" viewBox="0 0 40 60" aria-hidden="true"></svg></div>
        <div class="wheel-disk-layer">
            <canvas id="wheel" width="620" height="620"></canvas>
        </div>
        <canvas id="wheel-labels" width="620" height="620" aria-hidden="true"></canvas>
    </div>
    </div>
</div>
<script>
    const LOGICAL = 620;
    const TAU = Math.PI * 2;
    const DEFAULT_TICK = 'https://www.soundjay.com/buttons/button-16.mp3';

    let options = [], history = [], settings = {}, lastUpdate = 0, lastRemote = 0;
    let logicalAngle = 0, smoothAngle = 0, lastFrameTime = performance.now();
    let wheelState = 'idle';
    let spinStart = 0, spinDuration = 12000, spinStartAngle = 0, spinTotalRotation = 0;
    let settleTarget = 0, settleFrames = 0;
    let lastTick = -1, arrowAngle = 0, spinAudio = new Audio();
    /** Индекс победителя, выбранный до спина (угол останавливается точно на нём). */
    let pendingWinnerIndex = -1;
    let tickSound = new Audio(DEFAULT_TICK);
    let tickLoadedSrc = '';

    const canvas = document.getElementById('wheel');
    const canvasLabels = document.getElementById('wheel-labels');
    const ctx = canvas.getContext('2d', { alpha: true, desynchronized: true });
    const ctxLabels = canvasLabels.getContext('2d', { alpha: true, desynchronized: true });
    const arrowEl = document.getElementById('arrow');
    const winnerPlate = document.getElementById('winner-plate');
    let winnerHideTimer = null;
    /** Пока гасим панели/модалку перед стартом — не принимаем повторный клик */
    let spinUiLock = false;

    function normalizeOptions(raw) {
        return (raw || []).map(o =>
            typeof o === 'string' ? { label: o.trim(), sound: '' } : { label: String(o.label || '').trim(), sound: String(o.sound || '').trim() }
        ).filter(x => x.label);
    }
    function optionLabel(o) { return typeof o === 'string' ? o : (o && o.label) || ''; }
    function optionSound(o) { return typeof o === 'string' ? '' : (o && o.sound) || ''; }

    function getSpinDurationMs() {
        const s = settings.spinTimeSeconds;
        if (typeof s === 'number' && s > 0) return s * 1000;
        const lo = settings.spinTime;
        if (typeof lo === 'number' && lo > 0) return lo > 200 ? lo : lo * 1000;
        return 12000;
    }
    function getWinnerHoldMs() {
        const w = settings.winnerHoldSeconds;
        if (typeof w === 'number' && w > 0) return w * 1000;
        return 15000;
    }

    function setupCanvasResolution() {
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        const px = Math.max(1, Math.round(LOGICAL * dpr));
        canvas.width = canvas.height = px;
        canvasLabels.width = canvasLabels.height = px;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctxLabels.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.imageSmoothingEnabled = true;
        ctxLabels.imageSmoothingEnabled = true;
        if (typeof ctx.imageSmoothingQuality === 'string') {
            ctx.imageSmoothingQuality = 'high';
            ctxLabels.imageSmoothingQuality = 'high';
        }
    }
    setupCanvasResolution();
    window.addEventListener('resize', () => { setupCanvasResolution(); drawFrame(); });

    function parseGif(url) { if (!url || !url.includes('tenor.com/view/')) return url; return `https://media.tenor.com/${url.split('-').pop()}/tenor.gif`; }

    function sectorIndexFromAngle(a) {
        if (!options.length) return 0;
        const arc = TAU / options.length;
        let normalized = (Math.PI * 1.5 - a) % TAU;
        if (normalized < 0) normalized += TAU;
        let idx = Math.floor(normalized / arc);
        if (idx >= options.length) idx = options.length - 1;
        if (idx < 0) idx = 0;
        return idx;
    }

    /** Полный оборот: случайный сектор + много полных кругов; финальный угол строго в центре сектора. */
    function computeTotalRotationForWinner(startAngle, targetIdx) {
        const n = options.length;
        if (n <= 0) return Math.PI * 52;
        const arc = TAU / n;
        if (targetIdx < 0 || targetIdx >= n) targetIdx = 0;
        const desiredRem = ((Math.PI * 1.5 - (targetIdx + 0.5) * arc) % TAU + TAU) % TAU;
        const sRem = ((startAngle % TAU) + TAU) % TAU;
        let delta = (desiredRem - sRem);
        delta = ((delta % TAU) + TAU) % TAU;
        if (delta < 1e-9) delta = TAU;
        const fullSpins = 20 + Math.floor(Math.random() * 16);
        return fullSpins * TAU + delta;
    }

    function applyTickSoundFromSettings() {
        const u = (settings.tickSound || '').trim();
        const src = u || DEFAULT_TICK;
        if (src !== tickLoadedSrc) {
            tickSound = new Audio(src);
            tickLoadedSrc = src;
        }
    }

    function sectorPremiumColors(i, n) {
        const g1 = i % 2 === 0
            ? { h: 46, s: 88, l: 52 }
            : { h: 262, s: 38, l: 42 };
        const g2 = i % 2 === 0
            ? { h: 38, s: 92, l: 44 }
            : { h: 248, s: 48, l: 32 };
        return {
            base: `hsl(${g1.h},${g1.s}%,${g1.l}%)`,
            deep: `hsl(${g2.h},${g2.s}%,${g2.l}%)`,
            rim: i % 2 === 0 ? 'rgba(255,245,210,0.45)' : 'rgba(200,210,255,0.12)'
        };
    }

    const WHEEL_FONT = '800 %SIZEpx "Manrope","Inter",system-ui,sans-serif';
    let cachedTextWidthLimit = 158;

    function drawWheelDisk(visualAngle) {
        if (!options.length) return;
        const arc = TAU / options.length;
        const cx = LOGICAL / 2, cy = LOGICAL / 2, R = 300;
        cachedTextWidthLimit = Math.min(175, 125 + options.length * 2);

        ctx.clearRect(0, 0, LOGICAL, LOGICAL);
        ctx.save();
        ctx.translate(cx, cy);

        ctx.beginPath();
        ctx.arc(0, 0, R, 0, TAU);
        ctx.fillStyle = '#08080e';
        ctx.fill();

        options.forEach((opt, i) => {
            const startAngle = visualAngle + i * arc;
            const pal = sectorPremiumColors(i, options.length);
            const segGrad = ctx.createLinearGradient(
                Math.cos(startAngle) * 50, Math.sin(startAngle) * 50,
                Math.cos(startAngle + arc) * R, Math.sin(startAngle + arc) * R
            );
            segGrad.addColorStop(0, pal.base);
            segGrad.addColorStop(1, pal.deep);

            ctx.fillStyle = segGrad;
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.arc(0, 0, R, startAngle, startAngle + arc);
            ctx.fill();

            ctx.fillStyle = 'rgba(255,255,255,0.09)';
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.arc(0, 0, R, startAngle, startAngle + arc);
            ctx.fill();

            const midA = startAngle + arc * 0.5;
            const vx = Math.cos(midA), vy = Math.sin(midA);
            const depthG = ctx.createLinearGradient(0, 0, vx * R * 0.94, vy * R * 0.94);
            depthG.addColorStop(0, 'rgba(0,0,0,0)');
            depthG.addColorStop(0.55, 'rgba(0,0,0,0.02)');
            depthG.addColorStop(1, 'rgba(0,0,0,0.26)');
            ctx.fillStyle = depthG;
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.arc(0, 0, R, startAngle, startAngle + arc);
            ctx.fill();

            const hx = Math.cos(midA) * R * 0.52, hy = Math.sin(midA) * R * 0.52;
            const gloss = ctx.createRadialGradient(hx, hy, 0, hx, hy, R * 0.42);
            gloss.addColorStop(0, 'rgba(255,255,255,0.14)');
            gloss.addColorStop(0.45, 'rgba(255,255,255,0.03)');
            gloss.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = gloss;
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.arc(0, 0, R, startAngle, startAngle + arc);
            ctx.fill();

            ctx.strokeStyle = 'rgba(255,255,255,0.42)';
            ctx.lineWidth = 1.5;
            ctx.stroke();
            ctx.strokeStyle = 'rgba(0,0,0,0.22)';
            ctx.lineWidth = 0.9;
            ctx.stroke();

            ctx.strokeStyle = 'rgba(255,255,255,0.2)';
            ctx.lineWidth = 1.2;
            ctx.beginPath();
            ctx.arc(0, 0, R - 4, startAngle + 0.04, startAngle + arc - 0.04);
            ctx.stroke();
        });

        ctx.strokeStyle = '#0a090e';
        ctx.lineWidth = 28;
        ctx.beginPath();
        ctx.arc(0, 0, 285, 0, TAU);
        ctx.stroke();
        ctx.strokeStyle = 'rgba(40, 36, 32, 0.95)';
        ctx.lineWidth = 8;
        ctx.beginPath();
        ctx.arc(0, 0, 287, 0, TAU);
        ctx.stroke();
        ctx.strokeStyle = 'rgba(255, 232, 180, 0.55)';
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.arc(0, 0, 291, 0, TAU);
        ctx.stroke();
        ctx.strokeStyle = 'rgba(255, 218, 140, 0.45)';
        ctx.lineWidth = 1.6;
        ctx.beginPath();
        ctx.arc(0, 0, 298, 0, TAU);
        ctx.stroke();
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.22)';
        ctx.lineWidth = 1.1;
        ctx.beginPath();
        ctx.arc(0, 0, 282, 0, TAU);
        ctx.stroke();

        const tLights = performance.now() * 0.0015;
        const bulbCount = 24;
        for (let j = 0; j < bulbCount; j++) {
            const dotAngle = j * (TAU / bulbCount);
            const pulse = 0.5 + 0.5 * Math.sin(tLights * 7 + j * 0.6);
            const isOn = pulse > 0.38;
            const br = isOn ? 3.8 : 3;
            ctx.fillStyle = isOn ? 'rgba(255,252,235,0.98)' : 'rgba(55,50,44,0.9)';
            ctx.beginPath();
            ctx.arc(Math.cos(dotAngle) * 291, Math.sin(dotAngle) * 291, br, 0, Math.PI * 2);
            ctx.fill();
            if (isOn) {
                ctx.fillStyle = 'rgba(255,235,190,0.35)';
                ctx.beginPath();
                ctx.arc(Math.cos(dotAngle) * 291, Math.sin(dotAngle) * 291, br + 2.2, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        ctx.globalCompositeOperation = 'destination-out';
        ctx.beginPath();
        ctx.arc(0, 0, 64, 0, TAU);
        ctx.fill();
        ctx.restore();
    }

    function drawWheelLabels(visualAngle) {
        if (!options.length) return;
        const arc = TAU / options.length;
        const cx = LOGICAL / 2, cy = LOGICAL / 2;
        const fz = Math.max(10, settings.fontWheel || 14);
        const fontStack = WHEEL_FONT.replace('%SIZE', String(fz));

        ctxLabels.clearRect(0, 0, LOGICAL, LOGICAL);
        ctxLabels.save();
        ctxLabels.translate(cx, cy);
        if (typeof ctxLabels.letterSpacing !== 'undefined') ctxLabels.letterSpacing = '0.055em';
        ctxLabels.textBaseline = 'middle';

        options.forEach((opt, i) => {
            const text = optionLabel(opt);
            const startAngle = visualAngle + i * arc;
            ctxLabels.save();
            ctxLabels.rotate(startAngle + arc / 2);
            ctxLabels.font = fontStack;
            ctxLabels.textAlign = 'center';
            let d = text.toUpperCase();
            const lim = cachedTextWidthLimit;
            if (ctxLabels.measureText(d).width > lim) {
                while (d.length > 1 && ctxLabels.measureText(d + '…').width > lim) d = d.slice(0, -1);
                d += '…';
            }
            ctxLabels.lineJoin = 'round';
            ctxLabels.lineWidth = 2.5;
            ctxLabels.strokeStyle = '#0a0a0a';
            ctxLabels.fillStyle = '#ffffff';
            const tx = 184, ty = 0;
            ctxLabels.strokeText(d, tx, ty);
            ctxLabels.fillText(d, tx, ty);
            ctxLabels.restore();
        });

        if (typeof ctxLabels.letterSpacing !== 'undefined') ctxLabels.letterSpacing = '0';
        ctxLabels.restore();
    }

    function drawFrame(frameDelta = 0) {
        const ghost = wheelState === 'spin' && Math.abs(frameDelta) > 0.00006;
        if (ghost) {
            ctx.save();
            ctx.globalAlpha = Math.min(0.15, Math.abs(frameDelta) * 1.95);
            drawWheelDisk(smoothAngle - frameDelta * 0.62);
            ctx.restore();
        }
        ctx.globalAlpha = 1;
        drawWheelDisk(smoothAngle);
        drawWheelLabels(smoothAngle);
    }

    function updateArrow(vel, t = 0) {
        let target = -Math.min(vel * 1400 * (1 - t), 35);
        arrowAngle += (target - arrowAngle) * 0.17;
        if (Math.abs(arrowAngle) < 0.08) arrowAngle = 0;
        arrowEl.style.transform = `rotate(${arrowAngle}deg)`;
    }

    function stepMotion(dtSec) {
        let spinProgress = 0;
        const smoothBefore = smoothAngle;
        const idleOn = settings.idleSpinEnabled !== false;

        if (wheelState === 'idle' && idleOn) {
            logicalAngle += 0.12 * dtSec;
        } else if (wheelState === 'idle') {
            /* keep angle */
        } else if (wheelState === 'spin') {
            const now = performance.now();
            spinProgress = Math.min((now - spinStart) / spinDuration, 1);
            const ease = 1 - Math.pow(1 - spinProgress, 4.2);
            logicalAngle = spinStartAngle + spinTotalRotation * ease;
            if (spinProgress >= 1) {
                wheelState = 'settle';
                settleTarget = spinStartAngle + spinTotalRotation;
                logicalAngle = settleTarget;
                settleFrames = 0;
            }
        } else if (wheelState === 'settle') {
            logicalAngle = settleTarget;
            settleFrames++;
        }

        let lambda = 7.5;
        if (wheelState === 'spin') {
            lambda = 3 + 22 * spinProgress * spinProgress;
        } else if (wheelState === 'settle') {
            lambda = 22;
        }

        const alpha = 1 - Math.exp(-lambda * dtSec);
        smoothAngle += (logicalAngle - smoothAngle) * alpha;

        const frameDelta = smoothAngle - smoothBefore;

        const idx = sectorIndexFromAngle(smoothAngle);
        if (settings.tickEnabled !== false && idx !== lastTick && (wheelState === 'spin' || wheelState === 'settle')) {
            tickSound.currentTime = 0;
            tickSound.play().catch(() => {});
            lastTick = idx;
        } else if (settings.tickEnabled === false) {
            lastTick = idx;
        }

        const tArrow = wheelState === 'spin' ? spinProgress : 0;
        updateArrow(frameDelta, tArrow);
        drawFrame(frameDelta);

        if (wheelState === 'settle') {
            if (Math.abs(logicalAngle - smoothAngle) < 0.004 || settleFrames > 72) {
                smoothAngle = logicalAngle;
                drawFrame(0);
                arrowAngle = 0;
                arrowEl.style.transform = 'rotate(0deg)';
                wheelState = 'idle';
                lastTick = -1;
                if (spinAudio) {
                    const f = setInterval(() => {
                        if (spinAudio.volume > 0.05) spinAudio.volume -= 0.05;
                        else { spinAudio.pause(); clearInterval(f); }
                    }, 50);
                }
                finishSpin();
            }
        }
    }

    async function sync() {
        if (wheelState === 'spin' || wheelState === 'settle') return;
        const res = await fetch('/api/data');
        const data = await res.json();
        if (data.lastUpdate > lastUpdate) {
            options = normalizeOptions(data.options);
            history = data.history || [];
            settings = data.settings || {};
            lastUpdate = data.lastUpdate;
            applyTickSoundFromSettings();

            const b = document.body;
            const s = settings;
            const rad = s.panelRadius != null ? s.panelRadius : 35;
            b.style.setProperty('--panel-radius', rad + 'px');
            b.style.setProperty('--op', s.panelOpacity || 0.72);
            b.style.setProperty('--blur', s.panelBlur || 15);
            b.style.setProperty('--conv-speed', (s.conveyorSpeed || 15) + 's');

            const sn = document.getElementById('start-node');
            sn.style.width = s.startBtnWidth + 'px'; sn.style.height = s.startBtnHeight + 'px'; sn.style.top = s.startBtnTop + 'px';
            document.getElementById('st-label').innerText = s.startBtnText || '';
            document.getElementById('st-label').style.fontSize = s.fontBtn + 'px';

            const hn = document.getElementById('history-node');
            hn.style.width = s.historyWidth + 'px'; hn.style.height = s.historyHeight + 'px'; hn.style.top = s.historyTop + 'px';
            document.getElementById('history-title').innerText = s.historyTitle || '';
            document.getElementById('history-title').style.fontSize = s.fontHistTitle + 'px';

            document.getElementById('center-img').src = parseGif(s.centerImage);
            arrowEl.innerHTML = '<path d="M20 60 L40 10 Q40 0 30 0 L10 0 Q0 0 0 10 Z" fill="#ffffff" stroke="rgba(0,0,0,0.35)" stroke-width="1.5"/>';

            if (s.remoteTrigger > lastRemote && lastRemote !== 0) startSpin();
            lastRemote = s.remoteTrigger;

            const hList = document.getElementById('history-list');
            const labels = options.map(optionLabel);
            hList.innerHTML = labels.map(o => `<div class="list-item" style="font-size:${s.fontHist}px">${escapeHtml(o)}</div>`).join('')
                + labels.map(o => `<div class="list-item" style="font-size:${s.fontHist}px">${escapeHtml(o)}</div>`).join('');
            drawFrame();
        }
    }

    function escapeHtml(t) {
        return String(t).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function mainLoop(now) {
        const dtSec = Math.min((now - lastFrameTime) / 1000, 0.05);
        lastFrameTime = now;
        stepMotion(dtSec);
        requestAnimationFrame(mainLoop);
    }

    function closeWinnerModalSmooth(done) {
        if (!document.body.classList.contains('winner-active')) {
            done();
            return;
        }
        if (winnerHideTimer) { clearTimeout(winnerHideTimer); winnerHideTimer = null; }
        winnerPlate.classList.remove('is-open');
        winnerPlate.classList.add('is-closing');
        document.body.classList.add('revealing-ui');
        const leaveMs = 900;
        setTimeout(() => {
            document.body.classList.remove('winner-active');
            winnerPlate.classList.remove('is-closing', 'is-open');
            document.body.classList.remove('revealing-ui');
            done();
        }, leaveMs);
    }

    function dismissPanelsBeforeSpin(done) {
        if (!document.body.classList.contains('idle')) {
            done();
            return;
        }
        document.body.classList.add('panels-spin-exit');
        setTimeout(() => {
            document.body.classList.remove('idle', 'panels-enter', 'panels-spin-exit');
            done();
        }, 540);
    }

    function beginSpinPrep() {
        document.body.classList.remove('idle', 'winner-active', 'panels-enter', 'panels-spin-exit', 'revealing-ui');
        setTimeout(() => beginSpinMotion(), 360);
    }

    function startSpin() {
        if (wheelState !== 'idle' || !options.length) return;
        if (spinUiLock) return;
        spinUiLock = true;
        if (winnerHideTimer) { clearTimeout(winnerHideTimer); winnerHideTimer = null; }
        if (settings.spinSound) {
            spinAudio.src = settings.spinSound;
            spinAudio.volume = 0.5;
            spinAudio.play().then(() => { spinAudio.pause(); spinAudio.currentTime = 0; }).catch(() => {});
        }
        const kick = () => beginSpinPrep();
        if (document.body.classList.contains('winner-active')) {
            closeWinnerModalSmooth(kick);
        } else {
            dismissPanelsBeforeSpin(kick);
        }
    }

    function beginSpinMotion() {
        spinUiLock = false;
        document.body.classList.add('spinning');
        if (spinAudio.src) spinAudio.play().catch(() => {});
        spinDuration = getSpinDurationMs();
        spinStart = performance.now();
        spinStartAngle = logicalAngle;
        pendingWinnerIndex = Math.floor(Math.random() * options.length);
        spinTotalRotation = computeTotalRotationForWinner(spinStartAngle, pendingWinnerIndex);
        lastTick = sectorIndexFromAngle(smoothAngle);
        wheelState = 'spin';
    }

    async function finishSpin() {
        document.body.classList.remove('spinning');
        let idx = pendingWinnerIndex;
        if (idx < 0 || idx >= options.length) idx = sectorIndexFromAngle(logicalAngle);
        pendingWinnerIndex = -1;
        const opt = options[idx];
        const winner = optionLabel(opt);
        const winSound = (optionSound(opt) || '').trim();

        if (winner.includes('Джекпот')) {
            const end = Date.now() + 5000;
            const colors = ['#FFD700', '#D4AF37', '#FFDF00'];
            (function frame() {
                confetti({ particleCount: 12, origin: { x: Math.random(), y: -0.2 }, colors, shapes: ['circle'], gravity: 1.2, scalar: 2 });
                if (Date.now() < end) requestAnimationFrame(frame);
            })();
        } else if (!winner.includes('Ничего')) {
            confetti({ particleCount: 180, spread: 80, origin: { y: 0.6 } });
        }

        let flavor = 'ВЫИГРЫШ!';
        for (const [p, t] of Object.entries(settings.flavorTexts || {})) {
            if (winner.includes(p)) flavor = t;
        }
        document.getElementById('winner-flavor').innerText = flavor;
        document.getElementById('winner-name').innerText = winner;
        const nameEl = document.getElementById('winner-name');
        let bs = 48;
        if (winner.length > 35) bs = 20; else if (winner.length > 25) bs = 28; else if (winner.length > 15) bs = 36;
        nameEl.style.fontSize = bs + 'px';

        document.body.classList.add('winner-active');
        winnerPlate.classList.remove('is-closing');
        winnerPlate.classList.add('is-open');

        if (winSound) {
            const a = new Audio(winSound);
            a.volume = 0.9;
            a.play().catch(() => {});
        }

        history.push(winner);
        if (settings.autoDelete) options.splice(idx, 1);
        const pass = localStorage.getItem('spin_pass') || 'VikaWheel2024';
        await fetch('/api/data', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ options, history, settings, password: pass })
        });

        if (winnerHideTimer) clearTimeout(winnerHideTimer);
        winnerHideTimer = setTimeout(resetToIdle, getWinnerHoldMs());
    }

    function resetToIdle() {
        if (wheelState !== 'idle') return;
        if (winnerHideTimer) { clearTimeout(winnerHideTimer); winnerHideTimer = null; }
        closeWinnerModalSmooth(() => {
            setTimeout(() => {
                if (wheelState === 'idle') {
                    document.body.classList.add('idle', 'panels-enter');
                    setTimeout(() => document.body.classList.remove('panels-enter'), 1450);
                }
            }, 400);
        });
    }

    setInterval(sync, 2000);
    sync();
    if (document.fonts && document.fonts.ready) {
        document.fonts.ready.then(() => { try { drawFrame(); } catch (e) {} });
    }
    requestAnimationFrame(mainLoop);
</script>
</body>
</html>
